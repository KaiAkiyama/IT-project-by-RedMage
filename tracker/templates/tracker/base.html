<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  {% if user.is_authenticated %}
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'record_list' %}">📚 StudyTrack</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white">Hi, {{ user.username }}</span>
        <a href="{% url 'record_create' %}" class="btn btn-light btn-sm">+ New Record</a>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>
  {% endif %}

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
